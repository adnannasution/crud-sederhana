<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CRUD Produk</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f172a; --surface: #1e293b; --surface2: #273549;
    --border: #334155; --accent: #38bdf8; --danger: #f87171;
    --success: #4ade80; --warning: #fbbf24;
    --text: #e2e8f0; --muted: #94a3b8; --radius: 8px;
  }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 24px 16px; }
  header { max-width: 960px; margin: 0 auto 24px; }
  header h1 { font-size: 1.4rem; font-weight: 700; color: var(--accent); }
  header p  { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
  #toast { position: fixed; top: 20px; right: 20px; padding: 11px 18px; border-radius: var(--radius); font-size: .85rem; font-weight: 500; opacity: 0; transform: translateY(-8px); transition: all .2s; z-index: 999; pointer-events: none; }
  #toast.show { opacity: 1; transform: translateY(0); }
  #toast.success { background: #14532d; color: var(--success); border: 1px solid var(--success); }
  #toast.error   { background: #450a0a; color: var(--danger);  border: 1px solid var(--danger); }
  .stats { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; max-width: 960px; margin: 0 auto 20px; }
  .stat  { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; }
  .stat .lbl { font-size: .72rem; color: var(--muted); margin-bottom: 3px; }
  .stat .val { font-size: 1.4rem; font-weight: 700; }
  .stat.blue .val   { color: var(--accent); }
  .stat.green .val  { color: var(--success); }
  .stat.yellow .val { color: var(--warning); }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; max-width: 960px; margin: 0 auto 20px; }
  .card-title { font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 14px; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  @media(max-width:560px){ .grid2,.stats { grid-template-columns: 1fr; } }
  .fg label { display: block; font-size: .76rem; color: var(--muted); margin-bottom: 4px; }
  .fg input, .fg select { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 8px 11px; border-radius: 6px; font-size: .875rem; outline: none; transition: border-color .2s; }
  .fg input:focus, .fg select:focus { border-color: var(--accent); }
  .fg select option { background: var(--surface2); }
  .btn-row { display: flex; gap: 8px; margin-top: 14px; }
  button { padding: 8px 18px; border: none; border-radius: 6px; font-size: .85rem; font-weight: 600; cursor: pointer; transition: opacity .15s; }
  button:hover { opacity: .82; }
  .btn-primary { background: var(--accent);   color: #0f172a; }
  .btn-warn    { background: var(--warning);  color: #0f172a; }
  .btn-danger  { background: var(--danger);   color: #0f172a; }
  .btn-ghost   { background: var(--surface2); color: var(--muted); }
  .search-row { display: flex; gap: 10px; margin-bottom: 14px; align-items: center; }
  .search-row input { flex: 1; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 8px 11px; border-radius: 6px; font-size: .875rem; outline: none; }
  .search-row input:focus { border-color: var(--accent); }
  .badge { font-size: .72rem; padding: 3px 10px; border-radius: 99px; background: var(--surface2); color: var(--muted); white-space: nowrap; }
  .tw { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: .875rem; }
  thead th { text-align: left; padding: 9px 11px; border-bottom: 1px solid var(--border); color: var(--muted); font-size: .72rem; text-transform: uppercase; letter-spacing: .06em; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background .12s; }
  tbody tr:hover { background: var(--surface2); }
  tbody tr:last-child { border-bottom: none; }
  td { padding: 10px 11px; vertical-align: middle; }
  .pill { display: inline-block; padding: 2px 9px; border-radius: 99px; font-size: .72rem; font-weight: 600; background: rgba(56,189,248,.12); color: var(--accent); }
  .low  { color: var(--danger); font-weight: 600; }
  .act  { display: flex; gap: 6px; }
  .empty, .loading { text-align: center; padding: 36px; color: var(--muted); font-size: .875rem; }
  .spin { width: 22px; height: 22px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: sp .7s linear infinite; margin: 0 auto 8px; }
  @keyframes sp { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="toast"></div>

<header>
  <h1>📦 Manajemen Produk</h1>
  <p>CRUD App — JSON lokal / PostgreSQL</p>
</header>

<div class="stats">
  <div class="stat blue" ><div class="lbl">Total Produk</div><div class="val" id="s-total">—</div></div>
  <div class="stat green"><div class="lbl">Total Stok</div>  <div class="val" id="s-stok">—</div></div>
  <div class="stat yellow"><div class="lbl">Total Nilai</div><div class="val" id="s-nilai">—</div></div>
</div>

<div class="card">
  <div class="card-title" id="form-title">Tambah Produk Baru</div>
  <div class="grid2">
    <div class="fg"><label>Nama Produk *</label><input id="f-nama" placeholder="cth: Laptop Asus" /></div>
    <div class="fg">
      <label>Kategori</label>
      <select id="f-kat">
        <option value="">-- Pilih --</option>
        <option>Elektronik</option><option>Aksesoris</option>
        <option>Pakaian</option><option>Makanan</option><option>Lainnya</option>
      </select>
    </div>
    <div class="fg"><label>Stok</label><input id="f-stok" type="number" min="0" placeholder="0" /></div>
    <div class="fg"><label>Harga (Rp)</label><input id="f-harga" type="number" min="0" placeholder="0" /></div>
  </div>
  <div class="btn-row">
    <button class="btn-primary" onclick="submitForm()">💾 Simpan</button>
    <button class="btn-ghost"   onclick="resetForm()">✕ Batal</button>
  </div>
</div>

<div class="card">
  <div class="card-title">Daftar Produk</div>
  <div class="search-row">
    <input id="search" placeholder="🔍 Cari nama atau kategori..." oninput="render()" />
    <span class="badge" id="cnt">0 item</span>
  </div>
  <div class="tw">
    <table>
      <thead><tr><th>#</th><th>Nama</th><th>Kategori</th><th>Stok</th><th>Harga</th><th>Aksi</th></tr></thead>
      <tbody id="tbody"><tr><td colspan="6"><div class="loading"><div class="spin"></div>Memuat...</div></td></tr></tbody>
    </table>
  </div>
</div>

<script>
const API = '/api/produk';
let list = [], editId = null;

fetch(API).then(r => r.json()).then(j => { list = j.data || []; render(); stats(); })
  .catch(() => {
    document.getElementById('tbody').innerHTML =
      '<tr><td colspan="6"><div class="empty">⚠️ Gagal terhubung ke server</div></td></tr>';
  });

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = list.filter(p => p.nama.toLowerCase().includes(q) || (p.kategori||'').toLowerCase().includes(q));
  document.getElementById('cnt').textContent = filtered.length + ' item';
  if (!filtered.length) {
    document.getElementById('tbody').innerHTML = '<tr><td colspan="6"><div class="empty">📭 Tidak ada data</div></td></tr>';
    return;
  }
  document.getElementById('tbody').innerHTML = filtered.map((p, i) => `
    <tr>
      <td style="color:var(--muted)">${i+1}</td>
      <td><strong>${esc(p.nama)}</strong></td>
      <td><span class="pill">${esc(p.kategori||'-')}</span></td>
      <td class="${p.stok<5?'low':''}">${p.stok}${p.stok<5?' ⚠️':''}</td>
      <td>${rp(p.harga)}</td>
      <td><div class="act">
        <button class="btn-warn"   onclick="editItem(${p.id})">✏️</button>
        <button class="btn-danger" onclick="delItem(${p.id},'${esc(p.nama)}')">🗑️</button>
      </div></td>
    </tr>`).join('');
}

function stats() {
  document.getElementById('s-total').textContent = list.length;
  document.getElementById('s-stok').textContent  = list.reduce((a,p) => a+p.stok, 0);
  const n = list.reduce((a,p) => a+(p.harga*p.stok), 0);
  document.getElementById('s-nilai').textContent =
    n>=1e9 ? 'Rp '+(n/1e9).toFixed(1)+'M' : n>=1e6 ? 'Rp '+(n/1e6).toFixed(1)+'jt' : 'Rp '+n.toLocaleString('id-ID');
}

async function submitForm() {
  const nama     = document.getElementById('f-nama').value.trim();
  const kategori = document.getElementById('f-kat').value;
  const stok     = document.getElementById('f-stok').value  || 0;
  const harga    = document.getElementById('f-harga').value || 0;
  if (!nama) { toast('Nama wajib diisi!', 'error'); return; }
  try {
    const r = await fetch(editId ? `${API}/${editId}` : API, {
      method: editId ? 'PUT' : 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nama, kategori, stok, harga })
    });
    const j = await r.json();
    if (!j.success) throw new Error(j.message);
    toast(editId ? '✅ Produk diperbarui' : '✅ Produk ditambahkan', 'success');
    resetForm(); reload();
  } catch(e) { toast('Error: '+e.message, 'error'); }
}

function editItem(id) {
  const p = list.find(x => x.id === id); if (!p) return;
  editId = id;
  document.getElementById('f-nama').value  = p.nama;
  document.getElementById('f-kat').value   = p.kategori || '';
  document.getElementById('f-stok').value  = p.stok;
  document.getElementById('f-harga').value = p.harga;
  document.getElementById('form-title').textContent = '✏️ Edit: ' + p.nama;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function delItem(id, nama) {
  if (!confirm('Hapus "' + nama + '"?')) return;
  try {
    const r = await fetch(`${API}/${id}`, { method: 'DELETE' });
    const j = await r.json();
    if (!j.success) throw new Error(j.message);
    toast('🗑️ Dihapus', 'success'); reload();
  } catch(e) { toast('Gagal: '+e.message, 'error'); }
}

function resetForm() {
  editId = null;
  ['f-nama','f-stok','f-harga'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-kat').value = '';
  document.getElementById('form-title').textContent = 'Tambah Produk Baru';
}

function reload() {
  fetch(API).then(r => r.json()).then(j => { list = j.data || []; render(); stats(); });
}

let tt;
function toast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show ' + type;
  clearTimeout(tt); tt = setTimeout(() => t.className = '', 3000);
}

function rp(n) { return 'Rp ' + Number(n).toLocaleString('id-ID'); }
function esc(s) { return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
</script>
</body>
</html>
